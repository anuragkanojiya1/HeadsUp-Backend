<!DOCTYPE html>
<html>
<head>
    <title>Razorpay Integration</title>
</head>
<body>
    <button id="pay">Pay</button>
    <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
    <script>
        document.getElementById('pay').onclick = function (e) {
            var options = {
                "key": "rzp_test_SeGb92zkV0WerL", // Replace with your key
                "amount": "5", // Amount in currency subunits (50000 = ₹500)
                "currency": "INR",
                "name": "HeadsUp",
                "description": "Escrow Test",
                "order_id": "order_SevwAwDsNcbern", // Replace with your Order ID
                "handler": function (response){
                    alert(response.razorpay_payment_id);
                    console.log(response);
                },
                "theme": {
                    "color": "#3399cc"
                }
            };
            var rzp1 = new Razorpay(options);
            rzp1.open();
            e.preventDefault();
        }
    </script>
</body>
</html>
